<!DOCTYPE html>
<html lang="en">
<head>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<!-- Favicon (browser tab) -->
<link rel="icon" type="image/png" sizes="32x32" href="icon_1781470241782.png">

<!-- Apple iOS home screen icon -->
<link rel="apple-touch-icon" sizes="180x180" href="icon_1781470241782.png">

<!-- Android / PWA manifest -->
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<title>Nature's Paper</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #bfe7ff; /* pastel baby blue */
        font-family: "Poppins", sans-serif;
        overflow-x: hidden;
    }

    /* BIG SUN (CSS DRAWN) */
    .sun {
        position: absolute;
        top: 40px;
        left: 40px;
        width: 230px;
        height: 230px;
        background: #ffeb7f;
        border-radius: 50%;
        box-shadow: 0 0 90px #ffe066;
        z-index: 5;
    }

    /* GRASS — LOWER + BIGGER */
    .grass {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 30vh; /* LOWER */
        background: linear-gradient(#7ed957, #4caf50);
        overflow: visible;
    }

    /* FLOWERS — MANY MORE */
    .flower {
        position: absolute;
        bottom: 10px;
        width: 55px;
        height: 55px;
        background: pink;
        border-radius: 50%;
        box-shadow:
            -25px 0 pink,
            25px 0 pink,
            0 -25px pink,
            0 25px pink;
    }

    /* WINDMILLS — MORE + BIGGER */
    .windmill {
        position: absolute;
        bottom: 30px;
        width: 150px;
        height: 260px;
    }

    .windmill .pole {
        position: absolute;
        bottom: 0;
        left: 50%;
        width: 18px;
        height: 260px;
        background: #d9d9d9;
        transform: translateX(-50%);
    }

    .windmill .blades {
        position: absolute;
        top: 0;
        left: 50%;
        width: 150px;
        height: 150px;
        transform: translateX(-50%);
        animation: spin 7s linear infinite;
    }

    .blade {
        position: absolute;
        width: 28px;
        height: 80px;
        background: white;
        border-radius: 12px;
        left: 50%;
        transform-origin: bottom center;
    }

    .blade:nth-child(1) { transform: translateX(-50%) rotate(0deg); }
    .blade:nth-child(2) { transform: translateX(-50%) rotate(90deg); }
    .blade:nth-child(3) { transform: translateX(-50%) rotate(180deg); }
    .blade:nth-child(4) { transform: translateX(-50%) rotate(270deg); }

    @keyframes spin {
        from { transform: translateX(-50%) rotate(0deg); }
        to { transform: translateX(-50%) rotate(360deg); }
    }

    /* TITLE — PERFECTLY CENTERED + HUGE */
    .title {
        position: absolute;
        top: 32%;
        width: 100%;
        text-align: center;
        font-size: 120px;
        color: white;
        font-family: "Brush Script MT", cursive;
        text-shadow: 5px 5px 15px rgba(0,0,0,0.25);
        z-index: 10;
    }

    /* MENU BUTTON — BIGGER + MOVED SO IT NEVER TOUCHES SUN */
    .menu-btn {
        position: absolute;
        top: 40px;
        right: 60px;
        font-size: 90px;
        cursor: pointer;
        z-index: 20;
    }

    /* SIDEBAR — MOVED DOWN SO IT NEVER COVERS SUN */
    .sidebar {
        position: fixed;
        top: 0;
        left: -380px;
        width: 380px;
        height: 100%;
        background: #fff4b8;
        box-shadow: 4px 0 20px rgba(0,0,0,0.25);
        padding: 60px;
        transition: 0.4s;
        font-size: 30px;
        z-index: 30;
    }

    .sidebar.open {
        left: 0;
    }

    .sidebar h2 {
        margin-top: 0;
        font-size: 50px;
        color: #6b5b00;
        font-family: "Brush Script MT", cursive;
    }

    .sidebar a {
        display: block;
        margin: 35px 0;
        text-decoration: none;
        color: #4a4a4a;
        font-size: 30px;
    }

    .sidebar a:hover {
        color: #2d7a2d;
        transform: translateX(12px);
        transition: 0.2s;
    }
</style>
</head>

<body>

<div class="sun"></div>

<div class="title">Nature's Paper</div>

<div class="menu-btn" onclick="toggleMenu()">🌱</div>

<div class="sidebar" id="sidebar">
    <h2>Menu</h2>
    <a href="soil.html">Soil Condition Identifier 🌳</a>
    <a href="ai.html">AI Gardener 🌷</a>
    <a href="calendar.html">Plant Care Calendar 🍃</a>
    <a href="library.html">Plant Library 🌿</a>
    <a href="school.html">Nature School 🌸</a>
</div>

<!-- GRASS + MANY FLOWERS + MANY WINDMILLS -->
<div class="grass">

    <!-- FLOWERS -->
    <div class="flower" style="left: 5%;"></div>
    <div class="flower" style="left: 15%;"></div>
    <div class="flower" style="left: 25%;"></div>
    <div class="flower" style="left: 35%;"></div>
    <div class="flower" style="left: 45%;"></div>
    <div class="flower" style="left: 55%;"></div>
    <div class="flower" style="left: 65%;"></div>
    <div class="flower" style="left: 75%;"></div>
    <div class="flower" style="left: 85%;"></div>

    <!-- WINDMILLS -->
    <div class="windmill" style="left: 20%;">
        <div class="pole"></div>
        <div class="blades">
            <div class="blade"></div><div class="blade"></div><div class="blade"></div><div class="blade"></div>
        </div>
    </div>

    <div class="windmill" style="left: 50%;">
        <div class="pole"></div>
        <div class="blades">
            <div class="blade"></div><div class="blade"></div><div class="blade"></div><div class="blade"></div>
        </div>
    </div>

    <div class="windmill" style="left: 80%;">
        <div class="pole"></div>
        <div class="blades">
            <div class="blade"></div><div class="blade"></div><div class="blade"></div><div class="blade"></div>
        </div>
    </div>

</div>

<script>
function toggleMenu() {
    document.getElementById("sidebar").classList.toggle("open");
}
</script>

</body>
</html>
