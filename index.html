<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nature's Paper</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #bfe7ff; /* pastel baby blue */
        font-family: "Poppins", sans-serif;
        overflow-x: hidden;
    }

    /* BIG SUN */
    .sun {
        position: absolute;
        top: 30px;
        left: 30px;
        width: 180px;
        height: 180px;
        background: #ffeb7f;
        border-radius: 50%;
        box-shadow: 0 0 60px #ffe066;
    }

    /* GRASS + FLOWERS + WINDMILLS (FULL WIDTH) */
    .ground {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 45vh;
        background: linear-gradient(#7ed957, #4caf50);
        display: flex;
        justify-content: center;
        align-items: flex-end;
        overflow: hidden;
    }

    /* Decorative flowers */
    .flower {
        width: 60px;
        height: 60px;
        margin: 0 20px;
        background-size: cover;
        background-repeat: no-repeat;
    }

    /* Windmill */
    .windmill {
        width: 120px;
        height: 200px;
        background-size: contain;
        background-repeat: no-repeat;
        margin: 0 40px;
    }

    /* TITLE — BIGGER, BEAUTIFUL */
    .title {
        position: absolute;
        top: 28%;
        width: 100%;
        text-align: center;
        font-size: 90px;
        color: white;
        font-family: "Brush Script MT", cursive;
        text-shadow: 3px 3px 10px rgba(0,0,0,0.25);
    }

    /* MENU BUTTON — BIGGER */
    .menu-btn {
        position: absolute;
        top: 40px;
        right: 40px;
        font-size: 70px;
        cursor: pointer;
    }

    /* SIDEBAR — BIGGER, PRETTIER */
    .sidebar {
        position: fixed;
        top: 0;
        left: -300px;
        width: 300px;
        height: 100%;
        background: #fff4b8;
        box-shadow: 4px 0 15px rgba(0,0,0,0.25);
        padding: 40px;
        transition: 0.4s;
        font-size: 24px;
    }

    .sidebar.open {
        left: 0;
    }

    .sidebar h2 {
        margin-top: 0;
        font-size: 36px;
        color: #6b5b00;
        font-family: "Brush Script MT", cursive;
    }

    .sidebar a {
        display: block;
        margin: 25px 0;
        text-decoration: none;
        color: #4a4a4a;
        font-size: 24px;
    }

    .sidebar a:hover {
        color: #2d7a2d;
        transform: translateX(8px);
        transition: 0.2s;
    }
</style>
</head>

<body>

<div class="sun"></div>

<div class="title">Nature's Paper</div>

<div class="menu-btn" onclick="toggleMenu()">🌱</div>

<div class="sidebar" id="sidebar">
    <h2>Menu</h2>
    <a href="soil.html">Soil Condition Identifier 🌳</a>
    <a href="ai.html">AI Gardener 🌷</a>
    <a href="calendar.html">Plant Care Calendar 🍃</a>
    <a href="library.html">Plant Library 🌿</a>
    <a href="school.html">Nature School 🌸</a>
</div>

<!-- GROUND DECORATIONS -->
<div class="ground">
    <div class="flower" style="background-image:url('https://i.imgur.com/8YQ8p8X.png');"></div>
    <div class="windmill" style="background-image:url('https://i.imgur.com/0Y0Y0Y0.png');"></div>
    <div class="flower" style="background-image:url('https://i.imgur.com/8YQ8p8X.png');"></div>
</div>

<script>
function toggleMenu() {
    document.getElementById("sidebar").classList.toggle("open");
}
</script>

</body>
</html>
