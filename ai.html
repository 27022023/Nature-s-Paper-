<!DOCTYPE html>
<html lang="en">
<head>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
    
<!-- Favicon (browser tab) -->
<link rel="icon" type="image/png" sizes="32x32" href="icon_1781470241782.png">

<!-- Apple iOS home screen icon -->
<link rel="apple-touch-icon" sizes="180x180" href="icon_1781470241782.png">

<!-- Android / PWA manifest -->
<link rel="manifest" href="manifest.json">
    
<meta charset="UTF-8">
<title>AI Gardener 🌷</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #c8f7d4;
        font-family: "Poppins", sans-serif;
        overflow: hidden;
    }

    .title {
        text-align: center;
        margin-top: 30px;
        font-size: 120px;
        color: black;
        font-family: "Brush Script MT", cursive;
        text-shadow: 4px 4px 12px rgba(0,0,0,0.25);
    }

    .chat-container {
        width: 85%;
        height: 58vh;
        margin: 40px auto;
        background: #d9ecff;
        border-radius: 40px;
        padding: 45px;
        overflow-y: auto;
        box-shadow: 0 0 35px rgba(0,0,0,0.15);
        font-size: 32px;
    }

    .user-msg {
        background: #e6d6ff;
        padding: 28px;
        border-radius: 28px;
        margin: 25px 0;
        width: fit-content;
        max-width: 70%;
        margin-left: auto;
        font-size: 32px;
    }

    .ai-msg {
        background: #fff4d9;
        padding: 28px;
        border-radius: 28px;
        margin: 25px 0;
        width: fit-content;
        max-width: 70%;
        font-size: 32px;
    }

    .typing {
        font-size: 28px;
        color: #555;
        margin-top: 10px;
    }

    .input-area {
        width: 85%;
        margin: 0 auto 20px;
        display: flex;
        gap: 20px;
    }

    input[type="text"] {
        flex: 1;
        padding: 28px;
        font-size: 32px;
        border-radius: 28px;
        border: none;
        outline: none;
    }

    button {
        padding: 28px 45px;
        font-size: 32px;
        border-radius: 28px;
        border: none;
        background: #a8e6b1;
        cursor: pointer;
    }

    button:hover {
        background: #8fd99c;
    }

    .image-upload {
        width: 85%;
        margin: 0 auto 40px;
        background: #ffffff;
        border-radius: 30px;
        padding: 30px;
        box-shadow: 0 0 25px rgba(0,0,0,0.12);
        font-size: 30px;
    }

    .image-upload input[type="file"] {
        margin-top: 15px;
        font-size: 28px;
    }
</style>
</head>

<body>

<div class="title">AI Gardener 🌷</div>

<div class="chat-container" id="chat"></div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Ask me anything about plants...">
    <button onclick="sendMessage()">Send</button>
</div>

<div class="image-upload">
    <strong>📸 Upload a Plant Photo</strong><br>
    I’ll analyze the colors, structure, and leaf patterns to guess the plant type.
    <br><br>
    <input type="file" id="plantImage" accept="image/*">
</div>

<script>
/* ---------------------------------------------------------
   ADVANCED BOTANICAL KNOWLEDGE ENGINE (IVY LEAGUE LEVEL)
   --------------------------------------------------------- */

function aiResponse(message) {
    message = message.toLowerCase();

    function includesAny(words) {
        return words.some(w => message.includes(w));
    }

    /* EXPERT PLANT DATABASE */
    const plants = {
        monstera: "🌱 Monstera Deliciosa\n• Bright indirect light\n• Water every 7–10 days\n• High humidity (60–70%)\n• Aerial roots normal\n• Loves a moss pole\n• Yellow leaves = overwatering\n• Brown edges = low humidity",
        orchid: "🌸 Phalaenopsis Orchid\n• Filtered bright light\n• Water weekly (soak + drain)\n• Orchid bark only\n• 50–70% humidity\n• Never cut green roots\n• Rebloom cycle: cool nights + bright days",
        cactus: "🌵 Cactus\n• Full sun\n• Water every 2–3 weeks\n• Sandy soil\n• Winter dormancy\n• Stretching = not enough light",
        succulent: "🪴 Succulent\n• Bright light\n• Water when fully dry\n• Cactus mix\n• Mushy leaves = rot\n• Wrinkled leaves = thirsty",
        aloe: "🪴 Aloe Vera\n• Full sun\n• Water every 2 weeks\n• Sandy soil\n• Brown tips = stress\n• Cold drafts cause leaf collapse",
        basil: "🌿 Basil\n• Full sun\n• Moist soil\n• Pinch flowers\n• Loves warmth\n• Yellow leaves = lack of nutrients",
        lavender: "💜 Lavender\n• Full sun\n• Dry soil\n• Hates humidity\n• Prune lightly\n• Great for fragrance",
        pothos: "🌿 Pothos\n• Low–bright light\n• Water when dry\n• Easy propagation\n• Yellow leaves = overwatered",
        snake: "🐍 Snake Plant\n• Low–bright light\n• Water every 2–3 weeks\n• Very hardy\n• Great air purifier"
    };

    for (let key in plants) {
        if (message.includes(key)) return plants[key];
    }

    /* SYMPTOM DIAGNOSIS */
    if (includesAny(["yellow", "yellowing"])) {
        return "💛 Yellow Leaves Diagnosis:\n• Overwatering (most common)\n• Poor drainage\n• Low light\n• Natural aging of old leaves\n• Check roots for rot";
    }

    if (includesAny(["brown", "crispy", "dry edges"])) {
        return "🤎 Brown Tips:\n• Low humidity\n• Too much fertilizer\n• Underwatering\n• Heat stress";
    }

    if (includesAny(["spots", "dots", "patches"])) {
        return "🍂 Leaf Spots:\n• Fungal infection\n• Bacterial leaf spot\n• Pests (thrips, mites)\n• Improve airflow + remove affected leaves";
    }

    /* GENERAL CARE */
    if (includesAny(["care", "tips", "help"])) {
        return "🌿 General Care:\n• Bright indirect light\n• Water when top soil is dry\n• Use drainage holes\n• Rotate weekly\n• Wipe leaves\n• Fertilize monthly in spring/summer";
    }

    if (includesAny(["water", "watering"])) {
        return "💧 Watering Guide:\n• Check soil 2–3 cm deep\n• Water slowly until draining\n• Empty saucer\n• Less water in winter";
    }

    if (includesAny(["light", "sun"])) {
        return "☀️ Light Guide:\n• Bright indirect = most plants\n• Direct sun = cactus, lavender\n• Low light = pothos, snake plant";
    }

    if (includesAny(["soil"])) {
        return "🌱 Soil Guide:\n• Houseplants: potting mix + perlite\n• Cactus: sandy mix\n• Orchids: bark\n• Herbs: rich soil";
    }

    return "🌷 I'm your AI Gardener! Ask me about any plant, symptoms, care, soil, watering, or upload a photo.";
}

/* ---------------------------------------------------------
   CHATBOT LOGIC
   --------------------------------------------------------- */

function sendMessage() {
    const input = document.getElementById("userInput");
    const text = input.value.trim();
    if (text === "") return;

    const chat = document.getElementById("chat");

    const userBubble = document.createElement("div");
    userBubble.className = "user-msg";
    userBubble.innerText = text;
    chat.appendChild(userBubble);

    const typing = document.createElement("div");
    typing.className = "typing";
    typing.innerText = "AI Gardener is thinking...";
    chat.appendChild(typing);

    chat.scrollTop = chat.scrollHeight;
    input.value = "";

    setTimeout(() => {
        typing.remove();
        const aiBubble = document.createElement("div");
        aiBubble.className = "ai-msg";
        aiBubble.innerText = aiResponse(text);
        chat.appendChild(aiBubble);
        chat.scrollTop = chat.scrollHeight;
    }, 700);
}

/* ---------------------------------------------------------
   ADVANCED IMAGE ANALYSIS (FRONT-END AI)
   --------------------------------------------------------- */

document.getElementById("plantImage").addEventListener("change", function (event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function (e) {
        analyzePlantImage(e.target.result);
    };
    reader.readAsDataURL(file);
});

function analyzePlantImage(imageData) {
    const chat = document.getElementById("chat");

    const aiBubble = document.createElement("div");
    aiBubble.className = "ai-msg";
    aiBubble.innerText = "🔍 Analyzing plant photo...";
    chat.appendChild(aiBubble);

    const img = new Image();
    img.src = imageData;

    img.onload = function () {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);

        const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

        let green = 0, purple = 0, thick = 0, bright = 0;

        for (let i = 0; i < pixels.length; i += 4) {
            const r = pixels[i];
            const g = pixels[i + 1];
            const b = pixels[i + 2];

            if (g > r && g > b) green++;
            if (r > 120 && b > 120) purple++;
            if (g > 150 && r > 150) thick++;
            if (r + g + b > 600) bright++;
        }

        let guess = "🌿 This looks like a leafy green plant.";

        if (green > purple * 3) guess = "🌱 Likely a Monstera, Pothos, or leafy tropical plant.";
        if (purple > green * 2) guess = "💜 Could be Lavender or a purple‑flowering plant.";
        if (thick > green * 1.5) guess = "🪴 Possibly a succulent or aloe.";
        if (bright > green * 1.2) guess = "🌼 Could be a flowering plant with light petals.";

        const resultBubble = document.createElement("div");
        resultBubble.className = "ai-msg";
        resultBubble.innerText = guess;
        chat.appendChild(resultBubble);

        chat.scrollTop = chat.scrollHeight;
    };
}
</script>

</body>
</html>
