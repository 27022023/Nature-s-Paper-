<!DOCTYPE html>
<html lang="en">
<head>
<!-- Favicon (browser tab) -->
<link rel="icon" type="image/png" sizes="32x32" href="icon_1781470241782.png">

<!-- Apple iOS home screen icon -->
<link rel="apple-touch-icon" sizes="180x180" href="icon_1781470241782.png">

<!-- Android / PWA manifest -->
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<title>Plant Care Calendar 🍃</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #f0f6ff;
        font-family: "Poppins", sans-serif;
    }

    .title {
        text-align: center;
        margin-top: 30px;
        font-size: 130px;
        color: black;
        font-family: "Brush Script MT", cursive;
        text-shadow: 4px 4px 12px rgba(0,0,0,0.25);
    }

    .section {
        width: 90%;
        margin: 25px auto;
        background: #ffffff;
        border-radius: 40px;
        box-shadow: 0 0 30px rgba(0,0,0,0.12);
        padding: 35px 45px;
    }

    .section.calendar {
        background: #e3f2ff;
    }

    .section.library {
        background: #fff7e6;
    }

    .section.overview {
        background: #f5f0ff;
    }

    .nav-buttons {
        display: flex;
        justify-content: space-between;
        margin-top: 10px;
    }

    .nav-buttons button {
        padding: 25px 40px;
        font-size: 32px;
        border-radius: 30px;
        border: none;
        background: #cce6ff;
        cursor: pointer;
    }

    .nav-buttons button:hover {
        background: #b3d9ff;
    }

    .reminder-bar {
        margin-top: 15px;
        padding: 25px 35px;
        border-radius: 30px;
        font-size: 34px;
        box-shadow: 0 0 15px rgba(0,0,0,0.08);
    }

    .reminder-today {
        background: #b3ffb3;
    }

    .reminder-tomorrow {
        background: #ffe6b3;
        margin-top: 15px;
    }

    .month-header {
        text-align: center;
        font-size: 70px;
        margin: 25px 0 30px;
        color: #333;
    }

    .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 25px;
        font-size: 34px;
    }

    .day {
        background: white;
        padding: 35px;
        border-radius: 30px;
        text-align: center;
        cursor: pointer;
        box-shadow: 0 0 20px rgba(0,0,0,0.1);
        transition: 0.2s;
        font-size: 34px;
    }

    .day:hover {
        background: #d9ecff;
        transform: scale(1.07);
    }

    .day.has-tasks {
        border: 4px solid #8fd99c;
    }

    .popup {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        padding: 60px;
        border-radius: 45px;
        box-shadow: 0 0 40px rgba(0,0,0,0.25);
        width: 60%;
        display: none;
        font-size: 38px;
        z-index: 10;
    }

    .popup h2 {
        margin-top: 0;
        font-size: 70px;
        color: #333;
        font-family: "Brush Script MT", cursive;
    }

    textarea {
        width: 100%;
        height: 260px;
        font-size: 32px;
        padding: 25px;
        border-radius: 30px;
        border: 2px solid #ccc;
        resize: none;
    }

    .suggestions {
        margin-top: 20px;
        font-size: 30px;
        background: #f7faff;
        padding: 20px;
        border-radius: 25px;
        white-space: pre-line;
    }

    .save-btn, .close-btn {
        margin-top: 25px;
        padding: 25px 45px;
        font-size: 34px;
        border: none;
        border-radius: 30px;
        cursor: pointer;
    }

    .save-btn {
        background: #b3ffb3;
    }

    .save-btn:hover {
        background: #99ff99;
    }

    .close-btn {
        background: #ffb3b3;
    }

    .close-btn:hover {
        background: #ff9999;
    }

    .section h2 {
        margin-top: 0;
        font-size: 50px;
        font-family: "Brush Script MT", cursive;
        color: #333;
    }

    .library label {
        font-size: 26px;
        display: block;
        margin-top: 10px;
    }

    .library input,
    .library select,
    .library textarea {
        width: 100%;
        margin-top: 5px;
        margin-bottom: 10px;
        padding: 12px;
        border-radius: 20px;
        border: 1px solid #ccc;
        font-size: 24px;
    }

    .library button {
        padding: 18px 30px;
        border-radius: 25px;
        border: none;
        background: #ffd480;
        cursor: pointer;
        font-size: 26px;
        margin-top: 5px;
    }

    .library button:hover {
        background: #ffc266;
    }

    .profile-list {
        margin-top: 15px;
        max-height: 250px;
        overflow-y: auto;
        font-size: 22px;
    }

    .year-overview-list {
        list-style: none;
        padding-left: 0;
        font-size: 24px;
        margin-top: 10px;
    }

    .year-overview-list li {
        margin-bottom: 6px;
    }
</style>
</head>

<body>

<div class="title">Plant Care Calendar 🍃</div>

<!-- NAV + REMINDERS -->
<div class="section">
    <div class="nav-buttons">
        <button onclick="changeMonth(-1)">← Previous Month</button>
        <button onclick="changeMonth(1)">Next Month →</button>
    </div>

    <div class="reminder-bar reminder-today" id="reminderToday" style="display:none;"></div>
    <div class="reminder-bar reminder-tomorrow" id="reminderTomorrow" style="display:none;"></div>
</div>

<!-- CALENDAR -->
<div class="section calendar">
    <div class="month-header" id="monthName"></div>
    <div class="calendar-grid" id="calendarGrid"></div>
</div>

<!-- PLANT LIBRARY -->
<div class="section library">
    <h2>Plant Library 🌿</h2>
    <label>Plant name:</label>
    <input id="plantName" placeholder="Monstera, Orchid, Cactus...">
    <label>Type:</label>
    <select id="plantType">
        <option value="tropical">Tropical</option>
        <option value="succulent">Succulent / Cactus</option>
        <option value="orchid">Orchid</option>
        <option value="herb">Herb</option>
        <option value="other">Other</option>
    </select>
    <label>Notes:</label>
    <textarea id="plantNotes" placeholder="Light, soil, special needs..."></textarea>
    <button onclick="addPlantProfile()">Save Plant Profile</button>

    <div class="profile-list" id="profileList"></div>
</div>

<!-- YEAR OVERVIEW -->
<div class="section overview">
    <h2>Year Overview 📅</h2>
    <ul class="year-overview-list" id="yearOverviewList"></ul>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
    <h2 id="popupDate"></h2>
    <div class="suggestions" id="suggestionsBox"></div>
    <textarea id="taskInput" placeholder="Write your plant care tasks here..."></textarea>
    <button class="save-btn" onclick="saveTasks()">Save</button>
    <button class="close-btn" onclick="closePopup()">Close</button>
</div>

<script>
/* NOTIFICATIONS */
if ("Notification" in window) {
    Notification.requestPermission();
}

/* GLOBAL STATE */
let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();
const PLANT_PROFILE_KEY = "plantProfiles";

/* RENDER CALENDAR */
function renderCalendar() {
    const monthNames = [
        "January 🌨️", "February 💗", "March 🌱", "April 🌸",
        "May 🌼", "June 🌿", "July ☀️", "August 🌻",
        "September 🍂", "October 🎃", "November 🍁", "December 🎄"
    ];

    document.getElementById("monthName").innerText =
        monthNames[currentMonth] + " " + currentYear;

    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

    const grid = document.getElementById("calendarGrid");
    grid.innerHTML = "";

    for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement("div");
        grid.appendChild(empty);
    }

    for (let day = 1; day <= daysInMonth; day++) {
        const cell = document.createElement("div");
        cell.className = "day";
        cell.innerText = day;

        const saved = localStorage.getItem(getTaskKey(day));
        if (saved && saved.trim() !== "") {
            cell.classList.add("has-tasks");
        }

        cell.onclick = () => openPopup(day);
        grid.appendChild(cell);
    }

    updateReminders();
    renderYearOverview();
}

/* MONTH NAVIGATION */
function changeMonth(direction) {
    currentMonth += direction;

    if (currentMonth < 0) {
        currentMonth = 11;
        currentYear--;
    }

    if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
    }

    renderCalendar();
}

/* MEMORY KEYS */
function getTaskKey(day) {
    return `plantTasks_${currentYear}_${currentMonth}_${day}`;
}

/* POPUP */
function openPopup(day) {
    const popup = document.getElementById("popup");
    popup.style.display = "block";

    const monthNames = [
        "January 🌨️", "February 💗", "March 🌱", "April 🌸",
        "May 🌼", "June 🌿", "July ☀️", "August 🌻",
        "September 🍂", "October 🎃", "November 🍁", "December 🎄"
    ];

    document.getElementById("popupDate").innerText =
        `${monthNames[currentMonth]} ${day}`;

    const saved = localStorage.getItem(getTaskKey(day)) || "";
    document.getElementById("taskInput").value = saved;

    document.getElementById("suggestionsBox").innerText =
        generateSmartSuggestions(day, saved);

    popup.setAttribute("data-day", day);
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}

function saveTasks() {
    const popup = document.getElementById("popup");
    const day = popup.getAttribute("data-day");
    const text = document.getElementById("taskInput").value;

    localStorage.setItem(getTaskKey(day), text);

    renderCalendar();
    closePopup();
}

/* AUTO‑SCHEDULE + SUGGESTIONS */
function generateSmartSuggestions(day, existingText) {
    const monthNames = [
        "January", "February", "March", "April",
        "May", "June", "July", "August",
        "September", "October", "November", "December"
    ];

    const monthLabel = monthNames[currentMonth].toLowerCase();
    const base = [];

    if (["march", "april", "may"].includes(monthLabel)) {
        base.push("🌱 Spring: Repot root‑bound plants.");
        base.push("🌼 Start monthly fertilizing.");
    }

    if (["june", "july", "august"].includes(monthLabel)) {
        base.push("☀️ Summer: Soil dries fast — check moisture often.");
        base.push("💧 Water early morning or evening.");
    }

    if (["september", "october"].includes(monthLabel)) {
        base.push("🍂 Autumn: Reduce fertilizer.");
        base.push("🌿 Check for pests before bringing plants indoors.");
    }

    if (["november", "december", "january", "february"].includes(monthLabel)) {
        base.push("❄️ Winter: Water less, growth slows.");
        base.push("🌤 Move plants closer to windows.");
    }

    const textLower = existingText.toLowerCase();

    if (textLower.includes("monstera")) {
        base.push("🌱 Monstera: Water every 7–10 days; mist leaves.");
    }
    if (textLower.includes("orchid")) {
        base.push("🌸 Orchid: Weekly soak + drain; bright filtered light.");
    }
    if (textLower.includes("cactus") || textLower.includes("succulent")) {
        base.push("🌵 Cactus/Succulent: Water every 2–3 weeks; full sun.");
    }

    const profiles = loadPlantProfiles();
    profiles.forEach(p => {
        if (existingText.toLowerCase().includes(p.name.toLowerCase())) {
            if (p.type === "tropical") {
                base.push(`🌿 ${p.name}: Water every 5–7 days, bright indirect light.`);
            }
            if (p.type === "succulent") {
                base.push(`🌵 ${p.name}: Water every 2–3 weeks, very bright light.`);
            }
            if (p.type === "orchid") {
                base.push(`🌸 ${p.name}: Weekly soak, orchid bark, high humidity.`);
            }
            if (p.type === "herb") {
                base.push(`🌿 ${p.name}: Keep soil slightly moist, full sun.`);
            }
        }
    });

    if (base.length === 0) {
        return "🌿 Tip: Add plant names or use the Plant Library so I can auto‑generate schedules.";
    }

    return base.join("\n");
}

/* REMINDERS + NOTIFICATIONS */
function updateReminders() {
    const reminderToday = document.getElementById("reminderToday");
    const reminderTomorrow = document.getElementById("reminderTomorrow");

    const today = new Date();
    const todayDay = today.getDate();
    const tomorrowDay = todayDay + 1;

    const todayTasks = localStorage.getItem(getTaskKey(todayDay));
    const tomorrowTasks = localStorage.getItem(getTaskKey(tomorrowDay));

    if (todayTasks && todayTasks.trim() !== "") {
        reminderToday.style.display = "block";
        reminderToday.innerText = `🌿 Today: ${todayTasks}`;

        if (Notification.permission === "granted") {
            new Notification("🌿 Plant Care Reminder", {
                body: todayTasks
            });
        }
    } else {
        reminderToday.style.display = "none";
    }

    if (tomorrowTasks && tomorrowTasks.trim() !== "") {
        reminderTomorrow.style.display = "block";
        reminderTomorrow.innerText = `🍃 Tomorrow: ${tomorrowTasks}`;
    } else {
        reminderTomorrow.style.display = "none";
    }
}

/* PLANT LIBRARY */
function loadPlantProfiles() {
    const raw = localStorage.getItem(PLANT_PROFILE_KEY);
    if (!raw) return [];
    try {
        return JSON.parse(raw);
    } catch {
        return [];
    }
}

function savePlantProfiles(profiles) {
    localStorage.setItem(PLANT_PROFILE_KEY, JSON.stringify(profiles));
}

function addPlantProfile() {
    const name = document.getElementById("plantName").value.trim();
    const type = document.getElementById("plantType").value;
    const notes = document.getElementById("plantNotes").value.trim();

    if (!name) return;

    const profiles = loadPlantProfiles();
    profiles.push({ name, type, notes });
    savePlantProfiles(profiles);

    document.getElementById("plantName").value = "";
    document.getElementById("plantNotes").value = "";

    renderPlantProfiles();
    renderYearOverview();
}

function renderPlantProfiles() {
    const list = document.getElementById("profileList");
    const profiles = loadPlantProfiles();
    list.innerHTML = "";

    if (profiles.length === 0) {
        list.innerText = "No plants saved yet. Add some above!";
        return;
    }

    profiles.forEach(p => {
        const div = document.createElement("div");
        div.innerText = `• ${p.name} (${p.type}) – ${p.notes}`;
        list.appendChild(div);
    });
}

/* YEAR OVERVIEW */
function renderYearOverview() {
    const ul = document.getElementById("yearOverviewList");
    ul.innerHTML = "";

    const monthNames = [
        "January", "February", "March", "April",
        "May", "June", "July", "August",
        "September", "October", "November", "December"
    ];

    for (let m = 0; m < 12; m++) {
        let count = 0;
        const daysInMonth = new Date(currentYear, m + 1, 0).getDate();
        for (let d = 1; d <= daysInMonth; d++) {
            const key = `plantTasks_${currentYear}_${m}_${d}`;
            const val = localStorage.getItem(key);
            if (val && val.trim() !== "") count++;
        }
        const li = document.createElement("li");
        li.innerText = `${monthNames[m]}: ${count} days with tasks`;
        ul.appendChild(li);
    }
}

/* INITIAL RENDER */
renderCalendar();
renderPlantProfiles();
</script>

</body>
</html>
